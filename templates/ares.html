<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<title>Ares · Maritime Tactical</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
  --bg:          #18181b;
  --surface:     #232327;
  --surface-hi:  #2d2d32;
  --border:      rgba(255,255,255,0.07);
  --border-hi:   rgba(255,255,255,0.13);

  --red:    #c8313a;
  --amber:  #f0b429;
  --blue:   #3b9eff;
  --green:  #22c55e;
  --orange: #f97316;
  --cyan:   #22d3ee;
  --purple: #a855f7;
  --rose:   #f43f5e;

  --text:       rgba(255,255,255,0.92);
  --text-muted: rgba(255,255,255,0.55);
  --text-dim:   rgba(255,255,255,0.28);

  --sans: 'Outfit', sans-serif;
  --mono: 'DM Mono', monospace;
}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: var(--mono); color: var(--text); overflow: hidden; }

  #map { position: fixed; inset: 0; z-index: 1; }

  /* ── HUD layer ─────────────────────────────────── */
  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  /* Scanlines */
  #hud::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    pointer-events: none;
  }

  /* Corner brackets */
  .corner { position: absolute; width: 26px; height: 26px; }
  .corner.tl { top:12px; left:12px;  border-top:1.5px solid rgba(34,211,238,.55); border-left:1.5px solid rgba(34,211,238,.55); }
  .corner.tr { top:12px; right:12px; border-top:1.5px solid rgba(34,211,238,.55); border-right:1.5px solid rgba(34,211,238,.55); }
  .corner.bl { bottom:12px; left:12px;  border-bottom:1.5px solid rgba(34,211,238,.55); border-left:1.5px solid rgba(34,211,238,.55); }
  .corner.br { bottom:12px; right:12px; border-bottom:1.5px solid rgba(34,211,238,.55); border-right:1.5px solid rgba(34,211,238,.55); }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 48px;
    background: linear-gradient(to bottom, rgba(24,24,27,.85) 0%, transparent 100%);
    font-size: .55rem; letter-spacing: 2px; text-transform: uppercase;
  }
  #topbar .title   { color: rgba(34,211,238,.9); letter-spacing: 5px; }
  #topbar .coords  { color: var(--text-dim); }
  #topbar .updated { color: var(--text-dim); }

  /* Stats panel */
  #stats {
    position: absolute; top: 44px; right: 16px;
    background: rgba(24,24,27,.78);
    border: 1px solid rgba(34,211,238,.12);
    border-radius: 8px; padding: 10px 14px; min-width: 116px;
  }
  .stat { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 5px; font-size: .45rem; letter-spacing: 1.5px; text-transform: uppercase; }
  .stat:last-child { margin-bottom: 0; }
  .stat .lbl  { color: var(--text-dim); }
  .stat .cyan    { color: var(--cyan); }
  .stat .orange  { color: var(--orange); }
  .stat .green   { color: var(--green); }
  .stat .red     { color: var(--red); }
  .stat .white   { color: var(--text-muted); }

  /* Bottom bar */
  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 48px;
    background: linear-gradient(to top, rgba(24,24,27,.75) 0%, transparent 100%);
    font-size: .42rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
  }

  /* Back link — re-enable pointer-events */
  #back {
    position: absolute; top: 10px; left: 48px;
    font-size: .48rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); text-decoration: none; pointer-events: all;
    padding: 3px 6px; transition: color .2s;
  }
  #back:hover { color: rgba(34,211,238,.8); }

  /* ── Leaflet overrides ────────────────────────── */
  .leaflet-popup-content-wrapper {
    background: rgba(24,24,27,.93) !important;
    border: 1px solid rgba(34,211,238,.28) !important;
    border-radius: 6px !important; color: var(--text) !important;
    font-family: var(--mono) !important;
    box-shadow: 0 4px 24px rgba(0,0,0,.65) !important;
  }
  .leaflet-popup-tip { background: rgba(24,24,27,.93) !important; }
  .leaflet-popup-content { margin: 10px 14px !important; font-size: 11px !important; line-height: 1.9 !important; }
  .leaflet-control-zoom a { background: rgba(24,24,27,.82) !important; color: rgba(34,211,238,.7) !important; border-color: rgba(34,211,238,.18) !important; }
  .leaflet-control-attribution { background: rgba(24,24,27,.6) !important; color: rgba(255,255,255,.2) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: rgba(255,255,255,.3) !important; }

  /* Ship popup */
  .pop-name  { font-size: 12px; font-weight: bold; color: var(--cyan); letter-spacing: 1px; margin-bottom: 7px; }
  .pop-row   { display: flex; justify-content: space-between; gap: 20px; font-size: 10px; margin-bottom: 1px; }
  .pop-key   { color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
  .pop-val   { color: var(--text); }
  .pop-badge { display:inline-block; background:rgba(200,49,58,.18); border:1px solid rgba(200,49,58,.45); color:var(--red); font-size:8px; padding:1px 7px; border-radius:3px; letter-spacing:1.5px; margin-top:7px; }

  /* SAR toggle panel */
  #sar-panel {
    position: absolute; top: 176px; right: 16px;
    background: rgba(24,24,27,.78);
    border: 1px solid rgba(34,211,238,.12);
    border-radius: 8px; padding: 8px 14px; min-width: 116px;
    pointer-events: all;
  }
  .sar-label {
    font-size: .38rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .sar-btn {
    display: block; width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 4px; color: var(--text-dim);
    font-family: var(--mono); font-size: .4rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 5px 10px; cursor: pointer; margin-bottom: 5px;
    text-align: left; transition: all .2s;
  }
  .sar-btn:last-child { margin-bottom: 0; }
  .sar-btn.active {
    background: rgba(34,211,238,.1);
    border-color: rgba(34,211,238,.45);
    color: var(--cyan);
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="hud">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="topbar">
    <div class="title">Ares · Maritime Tactical</div>
    <div class="coords">26°32'N · 56°15'E · STRAIT OF HORMUZ</div>
    <div class="updated" id="updated-ts">—</div>
  </div>

  <div id="stats">
    <div class="stat"><span class="lbl">Active</span>  <span id="cnt-active"  class="cyan">—</span></div>
    <div class="stat"><span class="lbl">Tanker</span>  <span id="cnt-tanker"  class="orange">—</span></div>
    <div class="stat"><span class="lbl">Cargo</span>   <span id="cnt-cargo"   class="green">—</span></div>
    <div class="stat"><span class="lbl">Military</span><span id="cnt-military" class="red">—</span></div>
    <div class="stat"><span class="lbl">Other</span>   <span id="cnt-other"   class="white">—</span></div>
  </div>

  <div id="sar-panel">
    <div class="sar-label">SAR Layers</div>
    <button id="btn-sar-img"   class="sar-btn" onclick="toggleSarImg()">SAR IMG · OFF</button>
    <button id="btn-sar-ships" class="sar-btn" onclick="toggleSarShips()">SAR SHIPS · OFF</button>
  </div>

  <div id="bottombar">
    <span>AIS · aisstream.io</span>
    <span>API Hub · Port 5003</span>
    <span>AIS 30s · SAR 6h</span>
  </div>

  <a id="back" href="/">← Hub</a>
</div>

<script>
const map = L.map('map', { zoomControl: true, attributionControl: true })
              .setView([26.2, 56.8], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://carto.com">CartoDB</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);

function shipColor(type) {
  if (!type) return 'rgba(255,255,255,0.55)';
  const t = type.toLowerCase();
  if (t === 'tanker')    return '#f97316';
  if (t === 'cargo')     return '#22c55e';
  if (t === 'military')  return '#c8313a';
  if (t === 'passenger') return '#a855f7';
  return 'rgba(255,255,255,0.55)';
}

function makeArrow(color, headingDeg) {
  const h   = (headingDeg == null) ? 0 : headingDeg;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
    <g transform="rotate(${h}, 8, 8)">
      <polygon points="8,1 11,13 8,10 5,13" fill="${color}" stroke="rgba(0,0,0,0.45)" stroke-width="0.6"/>
      <circle cx="8" cy="8" r="2" fill="${color}" opacity="0.75"/>
    </g>
  </svg>`;
  return L.divIcon({ html: svg, iconSize: [16, 16], iconAnchor: [8, 8], className: '' });
}

function formatSpeed(s) {
  return (s != null) ? s + ' kn' : 'N/A';
}

function formatHeading(h) {
  return (h != null) ? h + '°' : 'N/A';
}

function buildPopup(ship) {
  const militaryBadge = ship.military
    ? '<div><span class="pop-badge">MILITARY</span></div>'
    : '';
  return `
    <div class="pop-name">${ship.name || ship.mmsi}</div>
    <div class="pop-row"><span class="pop-key">Type</span>    <span class="pop-val">${ship.type    || 'Unknown'}</span></div>
    <div class="pop-row"><span class="pop-key">Flag</span>    <span class="pop-val">${ship.country || 'Unknown'}</span></div>
    <div class="pop-row"><span class="pop-key">Speed</span>   <span class="pop-val">${formatSpeed(ship.speed)}</span></div>
    <div class="pop-row"><span class="pop-key">Heading</span> <span class="pop-val">${formatHeading(ship.heading)}</span></div>
    ${militaryBadge}
  `;
}

function updateHUD(ships) {
  const counts = { tanker: 0, cargo: 0, military: 0, other: 0 };
  ships.forEach(s => {
    const t = (s.type || '').toLowerCase();
    if (t === 'tanker')        counts.tanker++;
    else if (t === 'cargo')    counts.cargo++;
    else if (t === 'military') counts.military++;
    else                       counts.other++;
  });
  document.getElementById('cnt-active').textContent   = ships.length;
  document.getElementById('cnt-tanker').textContent   = counts.tanker;
  document.getElementById('cnt-cargo').textContent    = counts.cargo;
  document.getElementById('cnt-military').textContent = counts.military;
  document.getElementById('cnt-other').textContent    = counts.other;

  const now  = new Date();
  const hh   = String(now.getHours()).padStart(2, '0');
  const mm   = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('updated-ts').textContent = `Updated ${hh}:${mm}`;
}

function drawShips(ships) {
  markerLayer.clearLayers();
  ships.forEach(ship => {
    if (ship.lat == null || ship.lon == null) return;
    const color  = ship.military ? '#c8313a' : shipColor(ship.type);
    const marker = L.marker([ship.lat, ship.lon], {
      icon: makeArrow(color, ship.heading)
    });
    marker.bindPopup(buildPopup(ship), { maxWidth: 230 });
    markerLayer.addLayer(marker);
  });
}

function fetchAndDraw() {
  fetch('/api/ares/ships')
    .then(r => r.json())
    .then(data => {
      drawShips(data.ships || []);
      updateHUD(data.ships || []);
    })
    .catch(e => console.error('[Ares] fetch error:', e));
}

fetchAndDraw();
setInterval(fetchAndDraw, 30000);

// ── SAR layers ───────────────────────────────────────────────────────────
const sarImgLayer = L.tileLayer.wms('/api/ares/sar-tile', {
  layers:      'SAR-VV',
  format:      'image/png',
  transparent:  true,
  opacity:      0.65,
  version:     '1.3.0',
  tileSize:    512,
  attribution: '© Copernicus/ESA'
});

let sarShipLayer = L.layerGroup();
let sarImgOn     = false;
let sarShipsOn   = false;
let sarShipsLoaded = false;

function toggleSarImg() {
  sarImgOn = !sarImgOn;
  const btn = document.getElementById('btn-sar-img');
  if (sarImgOn) {
    sarImgLayer.addTo(map);
    btn.classList.add('active');
    btn.textContent = 'SAR IMG · ON';
  } else {
    map.removeLayer(sarImgLayer);
    btn.classList.remove('active');
    btn.textContent = 'SAR IMG · OFF';
  }
}

function makeSarIcon() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
    <rect x="2" y="2" width="10" height="10" fill="none" stroke="#22d3ee" stroke-width="1.5" transform="rotate(45,7,7)"/>
    <circle cx="7" cy="7" r="1.5" fill="#22d3ee" opacity="0.9"/>
  </svg>`;
  return L.divIcon({ html: svg, iconSize: [14, 14], iconAnchor: [7, 7], className: '' });
}

function buildSarPopup(s) {
  return `
    <div class="pop-name" style="color:#22d3ee">SAR DETECTION</div>
    <div class="pop-row"><span class="pop-key">Source</span> <span class="pop-val">Sentinel-1 GRD</span></div>
    <div class="pop-row"><span class="pop-key">Scene</span>  <span class="pop-val">${(s.scene||'').slice(0,10)}</span></div>
    <div class="pop-row"><span class="pop-key">Lat</span>    <span class="pop-val">${s.lat.toFixed(4)}°</span></div>
    <div class="pop-row"><span class="pop-key">Lon</span>    <span class="pop-val">${s.lon.toFixed(4)}°</span></div>
    <div style="margin-top:7px;font-size:9px;color:rgba(255,255,255,.25)">No AIS required — radar return only</div>
  `;
}

function drawSarShips(ships) {
  sarShipLayer.clearLayers();
  ships.forEach(s => {
    const m = L.marker([s.lat, s.lon], { icon: makeSarIcon() });
    m.bindPopup(buildSarPopup(s), { maxWidth: 230 });
    sarShipLayer.addLayer(m);
  });
}

function fetchSarShips() {
  if (!sarShipsOn) return;
  fetch('/api/ares/sar-ships')
    .then(r => r.json())
    .then(data => { drawSarShips(data.ships || []); sarShipsLoaded = true; })
    .catch(e => console.error('[SAR] fetch error:', e));
}

function toggleSarShips() {
  sarShipsOn = !sarShipsOn;
  const btn = document.getElementById('btn-sar-ships');
  if (sarShipsOn) {
    sarShipLayer.addTo(map);
    btn.classList.add('active');
    btn.textContent = 'SAR SHIPS · ON';
    if (!sarShipsLoaded) fetchSarShips();
  } else {
    map.removeLayer(sarShipLayer);
    btn.classList.remove('active');
    btn.textContent = 'SAR SHIPS · OFF';
  }
}

setInterval(fetchSarShips, 30 * 60 * 1000);
</script>

</body>
</html>
